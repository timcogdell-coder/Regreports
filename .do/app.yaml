name: regreports
region: nyc

services:
  - name: api
    source_dir: /backend
    github:
      repo: timcogdell-coder/regreports
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: gunicorn app:app
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET

  - name: frontend
    source_dir: /frontend
    github:
      repo: timcogdell-coder/regreports
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    environment_slug: node-js

databases:
  - name: regreports-db
    engine: PG
    version: "15"
    size: db-s-dev-database
